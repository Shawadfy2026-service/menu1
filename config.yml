backend:
  name: github
  repo: YourUsername/digital-menu # 👈 اكتب هنا اسم حسابك على جيت هب مكان YourUsername واسم المستودع مكان digital-menu
  branch: main

media_folder: "images" # المجلد الذي ستُحفظ فيه صور المنتجات واللوجو تلقائياً على جيت هب
public_folder: "/images"

# تحويل واجهة التحكم للغة العربية لسهولة استخدام العميل
locale: "ar"

collections:
  # ----------------------------------------------------
  # القسم الأول: إعدادات الشركة والسوشيال ميديا (تعديل لمرة واحدة أو عند الحاجة)
  # ----------------------------------------------------
  - name: "settings"
    label: "⚙️ إعدادات الشركة والميديا"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/settings.json"
        label: "البيانات الأساسية للمطعم"
        name: "general"
        fields:
          - { label: "اسم الشركة/المطعم (بالعربي)", name: "company_name_ar", widget: "string" }
          - { label: "اسم الشركة/المطعم (بالإنجليزي)", name: "company_name_en", widget: "string" }
          - { label: "شعار الشركة (اللوجو)", name: "logo", widget: "image" }
          - { label: "رابط الفيسبوك", name: "facebook", widget: "string", required: false }
          - { label: "رابط الإنستغرام", name: "instagram", widget: "string", required: false }
          - { label: "رابط تيك توك", name: "tiktok", widget: "string", required: false }
          - { label: "رابط الواتساب المستلم للطلبات", name: "whatsapp", widget: "string", hint: "اكتب الرقم بكود الدولة بدون أصفار أو علامة + (مثال لمصر: 201000000000)" }

  # ----------------------------------------------------
  # القسم الثاني: إدارة الكتالوج (إضافة، تعديل، حذف المنتجات والأسعار)
  # ----------------------------------------------------
  - name: "products"
    label: "🍔 إدارة المنتجات والوجبات"
    folder: "data/products" # سيتم حفظ كل منتج كملف خفيف لتسهيل التعديل والحذف
    create: true # يتيح للعميل زر "إضافة منتج جديد"
    slug: "{{fields.title}}"
    editor:
      preview: false
    fields:
      - { label: "اسم المنتج / الوجبة", name: "title", widget: "string" }
      - { label: "السعر (ج.م)", name: "price", widget: "number", value_type: "int" }
      - { label: "صورة المنتج", name: "image", widget: "image" }
      - { label: "وصف قصير للمنتج", name: "description", widget: "text", required: false }
      - { 
          label: "التصنيف / القسم", 
          name: "category", 
          widget: "select", 
          options: ["إلكترونيات", "أزياء", "منزل", "وجبات رئيسية", "مشروبات", "حلويات"] 
        }
